<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神秘学概論 - ルドルフ・シュタイナー学習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500;600&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --card: #1f2544;
  --border: rgba(233,196,106,0.15);
  --gold: #e9c46a;
  --gold2: #f4a261;
  --text: #eae2d6;
  --text2: #a8a0a0;
  --text3: #6a6a7a;
  --purple: #9d4edd;
  --blue: #4cc9f0;
  --green: #52b788;
  --serif: 'Noto Serif JP', serif;
  --display: 'Cormorant Garamond', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--serif);
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.8;
}

.app {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Header */
.header {
  text-align: center;
  padding: 2rem 0 3rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.header-symbol { font-size: 3rem; margin-bottom: 1rem; opacity: 0.8; }

.header h1 {
  font-family: var(--display);
  font-size: 2.5rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.header-sub {
  font-size: 1rem;
  color: var(--text2);
  letter-spacing: 0.15em;
  font-weight: 300;
}

.header-author {
  font-family: var(--display);
  font-size: 1.1rem;
  color: var(--gold2);
  margin-top: 0.75rem;
  letter-spacing: 0.05em;
}

/* Navigation */
.nav {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.nav-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 0.5rem 1.25rem;
  border-radius: 2rem;
  font-family: var(--serif);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover { border-color: var(--gold); color: var(--gold); }
.nav-btn.active {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--bg);
  border-color: transparent;
}

/* Progress Bar */
.progress-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 1rem;
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.progress-label { font-size: 0.85rem; color: var(--text2); }
.progress-value { font-family: var(--display); font-size: 1.1rem; color: var(--gold); }

.progress-bar {
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Chapter List */
.chapter-list { display: flex; flex-direction: column; gap: 1rem; }

.chapter-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 1rem;
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}

.chapter-card:hover { border-color: var(--gold); transform: translateX(4px); }
.chapter-card:hover::before { opacity: 1; }
.chapter-card.completed { border-color: var(--green); }
.chapter-card.completed::before { background: var(--green); opacity: 1; }

.chapter-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}

.chapter-num {
  font-family: var(--display);
  font-size: 0.8rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}

.chapter-status {
  font-size: 0.75rem;
  padding: 0.25rem 0.75rem;
  border-radius: 1rem;
  background: var(--bg);
  color: var(--text3);
}

.chapter-card.completed .chapter-status {
  background: rgba(82,183,136,0.2);
  color: var(--green);
}

.chapter-title {
  font-size: 1.25rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.chapter-title-de {
  font-family: var(--display);
  font-size: 0.9rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 0.75rem;
}

.chapter-desc {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.7;
}

/* Chapter Detail */
.chapter-detail {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 1rem;
  padding: 2rem;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1.5rem;
  transition: color 0.3s;
}

.back-btn:hover { color: var(--gold); }

.detail-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.5rem;
  margin-bottom: 2rem;
}

.detail-num {
  font-family: var(--display);
  font-size: 0.9rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.detail-title { font-size: 1.75rem; font-weight: 500; margin-bottom: 0.5rem; }

.detail-title-de {
  font-family: var(--display);
  font-size: 1rem;
  color: var(--text3);
  font-style: italic;
}

/* Points List */
.points-section { margin-bottom: 2rem; }

.points-title {
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.points-list { display: flex; flex-direction: column; gap: 0.5rem; }

.point-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 0.75rem;
  overflow: hidden;
  transition: all 0.3s;
}

.point-item:hover { border-color: rgba(233,196,106,0.3); }
.point-item.expanded { border-color: var(--gold); }

.point-header {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: background 0.3s;
}

.point-header:hover { background: rgba(233,196,106,0.05); }

.point-num {
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--gold);
  min-width: 24px;
  font-weight: 500;
}

.point-summary {
  flex: 1;
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.6;
}

.point-toggle {
  color: var(--text3);
  font-size: 0.8rem;
  transition: transform 0.3s;
}

.point-item.expanded .point-toggle { transform: rotate(180deg); }

.point-detail {
  display: none;
  padding: 0 1.25rem 1.25rem 3rem;
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.8;
  border-top: 1px solid var(--border);
  margin-top: 0;
  padding-top: 1rem;
}

.point-item.expanded .point-detail { display: block; }

.point-detail p { margin-bottom: 0.75rem; }
.point-detail p:last-child { margin-bottom: 0; }

.point-keyword {
  display: inline-block;
  background: rgba(233,196,106,0.15);
  color: var(--gold);
  padding: 0.1rem 0.5rem;
  border-radius: 0.25rem;
  font-size: 0.85rem;
  margin-right: 0.25rem;
}

/* Concepts */
.concepts-section { margin-bottom: 2rem; }

.concepts-title {
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.concept-list { display: flex; flex-direction: column; gap: 1rem; }

.concept-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 0.75rem;
  padding: 1.25rem;
}

.concept-term { font-weight: 500; color: var(--gold2); margin-bottom: 0.25rem; }

.concept-term-de {
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 0.5rem;
}

.concept-def { font-size: 0.9rem; color: var(--text2); line-height: 1.7; }

/* Meditation */
.meditation-section {
  background: linear-gradient(135deg, rgba(157,78,221,0.1), rgba(76,201,240,0.1));
  border: 1px solid rgba(157,78,221,0.3);
  border-radius: 0.75rem;
  padding: 1.5rem;
  margin-bottom: 2rem;
}

.meditation-title {
  font-size: 1rem;
  color: var(--purple);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.meditation-text {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 2;
  font-style: italic;
}

/* Notes */
.notes-section { margin-bottom: 2rem; }
.notes-title { font-size: 1rem; color: var(--gold); margin-bottom: 1rem; }

.notes-textarea {
  width: 100%;
  min-height: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 0.75rem;
  padding: 1rem;
  color: var(--text);
  font-family: var(--serif);
  font-size: 0.9rem;
  line-height: 1.8;
  resize: vertical;
}

.notes-textarea:focus { outline: none; border-color: var(--gold); }

/* Complete Button */
.complete-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--bg);
  border: none;
  border-radius: 0.75rem;
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}

.complete-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(233,196,106,0.3);
}

.complete-btn.completed { background: var(--green); }

/* Glossary */
.glossary-search { margin-bottom: 1.5rem; }

.glossary-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  color: var(--text);
  font-family: var(--serif);
  font-size: 0.9rem;
}

.glossary-input:focus { outline: none; border-color: var(--gold); }

.glossary-list { display: flex; flex-direction: column; gap: 1rem; }

.glossary-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0.75rem;
  padding: 1.25rem;
}

.glossary-term { font-weight: 500; color: var(--gold); margin-bottom: 0.25rem; }

.glossary-term-de {
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 0.5rem;
}

.glossary-def { font-size: 0.9rem; color: var(--text2); line-height: 1.7; }

/* My Notes */
.my-notes-list { display: flex; flex-direction: column; gap: 1rem; }

.my-note-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0.75rem;
  padding: 1.25rem;
  cursor: pointer;
  transition: border-color 0.3s;
}

.my-note-card:hover { border-color: var(--gold); }

.my-note-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}

.my-note-chapter { font-size: 0.85rem; color: var(--gold); }
.my-note-date { font-size: 0.75rem; color: var(--text3); }

.my-note-content {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
}

.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 0;
  margin-top: 2rem;
  border-top: 1px solid var(--border);
  color: var(--text3);
  font-size: 0.8rem;
}

/* Responsive */
@media (max-width: 600px) {
  .app { padding: 1rem; }
  .header h1 { font-size: 1.75rem; }
  .chapter-card { padding: 1.25rem; }
  .chapter-detail { padding: 1.25rem; }
  .point-header { padding: 0.875rem 1rem; }
  .point-detail { padding: 0 1rem 1rem 2.5rem; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-symbol">&#10070;</div>
    <h1>Occult Science</h1>
    <div class="header-sub">神秘学概論</div>
    <div class="header-author">Rudolf Steiner</div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('chapters')">章立て</button>
    <button class="nav-btn" onclick="showSection('glossary')">用語集</button>
    <button class="nav-btn" onclick="showSection('notes')">学習ノート</button>
  </nav>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">学習進捗</span>
      <span class="progress-value" id="progressValue">0 / 7 章</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <section class="section active" id="sec-chapters">
    <div class="chapter-list" id="chapterList"></div>
  </section>

  <section class="section" id="sec-detail">
    <div class="chapter-detail" id="chapterDetail"></div>
  </section>

  <section class="section" id="sec-glossary">
    <div class="glossary-search">
      <input type="text" class="glossary-input" placeholder="用語を検索..." oninput="filterGlossary(this.value)">
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </section>

  <section class="section" id="sec-notes">
    <div class="my-notes-list" id="myNotesList"></div>
  </section>

  <footer class="footer">
    神秘学概論 学習アプリ v1.1<br>
    Based on "Die Geheimwissenschaft im Umriß" (1910)
  </footer>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA - 各章10項目の要約と詳細
// ═══════════════════════════════════════════════════════════

const chapters = [
  {
    id: 1,
    num: 'I',
    title: '神秘学の性格',
    titleDe: 'Charakter der Geheimwissenschaft',
    desc: '神秘学とは何か、その認識方法と科学的態度について。感覚を超えた世界への道筋を示す序論。',
    points: [
      {
        summary: '神秘学は「秘密の」学ではなく、通常は隠されている世界を扱う学問である',
        detail: '「神秘学」という言葉は誤解を招きやすいが、これは秘密結社の教えではない。感覚では認識できない霊的世界を、自然科学が物質を研究するように体系的に研究する学問である。「隠された」とは、通常の意識では見えないという意味である。'
      },
      {
        summary: '自然科学が物質を研究するように、神秘学は霊的世界を研究する',
        detail: '神秘学は科学に反するものではなく、科学の延長線上にある。自然科学が感覚で捉えられる現象を研究するのに対し、神秘学は感覚を超えた領域を同じく厳密な方法で研究する。両者は対立するのではなく、補完し合う関係にある。'
      },
      {
        summary: '霊的認識は特別な才能ではなく、正しい訓練により誰でも到達できる',
        detail: 'シュタイナーは、霊的認識が選ばれた少数者だけのものではないことを強調する。数学を学ぶように、正しい方法で魂を訓練すれば、誰でも霊的真理を直接体験できる。これは信仰の問題ではなく、認識の問題である。'
      },
      {
        summary: '神秘学の知識を受け入れるのに、まず自分で霊視する必要はない',
        detail: '本を読んで数学を理解するのに数学者である必要がないように、神秘学の成果を理解するのに霊能者である必要はない。健全な判断力と偏見のない思考があれば、その内容の真理性を認識できる。'
      },
      {
        summary: '霊的研究者の報告は、論理と直観により検証できる',
        detail: '神秘学の主張は盲目的に信じる必要はない。論理的思考と内的な真理感覚により、その内容を吟味できる。真理は自ら光を放ち、魂に響く力を持っている。疑問を持つことは健全な態度である。'
      },
      {
        summary: '唯物論的世界観は、感覚の範囲に限定された見方にすぎない',
        detail: '唯物論は感覚で捉えられるものだけを実在と見なすが、これは認識の限界を実在の限界と混同している。目に見えないものが存在しないわけではない。電波や重力のように、見えなくても作用するものは多い。'
      },
      {
        summary: '霊的世界の認識には、魂の特別な訓練と道徳的発展が必要',
        detail: '霊的認識は単なる知識の蓄積ではなく、魂全体の変容を必要とする。集中力、思考の明晰さ、感情の浄化、道徳的な強さ——これらが霊的器官の発達の基盤となる。内面の成長なしに霊的認識はありえない。'
      },
      {
        summary: '現代人は霊的なものを求める内的衝動を持っている',
        detail: '物質文明の発展にもかかわらず（あるいはそれゆえに）、現代人の魂は霊的な渇きを感じている。科学は多くを説明するが、人生の意味、死後の問題、道徳の根拠については沈黙する。この空虚さが霊的探求への動機となる。'
      },
      {
        summary: '神秘学は迷信や空想とは根本的に異なる',
        detail: '神秘学は厳密な方法論に基づく。霊的研究者は自分の体験を批判的に吟味し、主観的願望と客観的認識を区別する訓練を積む。感情的な憧れや空想的な思い込みは、真の霊的認識の障害となる。'
      },
      {
        summary: '本書は霊的研究の成果を、思考で追体験できる形で提示する',
        detail: 'シュタイナーは、読者が霊視能力を持たなくても理解できるよう、霊的真理を思考可能な形で表現している。読者は自分の思考力を通じて、これらの内容を内的に追体験し、その真理性を確認できる。'
      }
    ],
    concepts: [
      { term: '神秘学', termDe: 'Geheimwissenschaft', def: '感覚で知覚できる世界の背後にある、隠された霊的現実を探求する学問。' },
      { term: '超感覚的認識', termDe: 'übersinnliche Erkenntnis', def: '物質的感覚器官を超えて、霊的世界を直接認識する能力。' },
      { term: '霊的研究', termDe: 'Geistesforschung', def: '自然科学が物質世界を研究するように、霊的世界を体系的に研究すること。' }
    ],
    meditation: '「私は感覚の背後にある真実を求める。見えるものの奥に、見えないものが存在する。」この言葉を静かに繰り返し、その意味を深く味わってください。'
  },
  {
    id: 2,
    num: 'II',
    title: '人間の本質',
    titleDe: 'Das Wesen des Menschen',
    desc: '人間を構成する四つの要素—物質体、エーテル体、アストラル体、自我—の詳細な解説。',
    points: [
      {
        summary: '人間は物質体・エーテル体・アストラル体・自我の四つの構成要素からなる',
        detail: '人間は単なる物質的存在ではなく、四つの異なる層から構成されている。各層は異なる世界に属し、異なる法則に従う。この理解が、人間の生、死、病気、意識、道徳などを理解する鍵となる。'
      },
      {
        summary: '物質体は鉱物界と共通し、死後は物質界の法則に従って分解する',
        detail: '私たちの肉体は、鉱物と同じ物理・化学法則に従う。炭素、水素、酸素などの元素から構成され、死後はこれらの元素に分解して自然に還る。物質体だけなら、人間は精巧な機械にすぎない。'
      },

// STATE
// ═══════════════════════════════════════════════════════════

const LS_KEY = 'steiner_study_v1';
let state = { completed: [], notes: {} };

function loadState() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (name === 'chapters') {
    document.getElementById('sec-chapters').classList.add('active');
    document.querySelectorAll('.nav-btn')[0].classList.add('active');
  } else if (name === 'glossary') {
    document.getElementById('sec-glossary').classList.add('active');
    document.querySelectorAll('.nav-btn')[1].classList.add('active');
    renderGlossary();
  } else if (name === 'notes') {
    document.getElementById('sec-notes').classList.add('active');
    document.querySelectorAll('.nav-btn')[2].classList.add('active');
    renderMyNotes();
  } else if (name === 'detail') {
    document.getElementById('sec-detail').classList.add('active');
  }
}

function updateProgress() {
  const completed = state.completed.length;
  const total = chapters.length;
  const pct = Math.round((completed / total) * 100);
  document.getElementById('progressValue').textContent = `${completed} / ${total} 章`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function renderChapters() {
  const list = document.getElementById('chapterList');
  list.innerHTML = chapters.map(ch => {
    const isCompleted = state.completed.includes(ch.id);
    return `
      <div class="chapter-card ${isCompleted ? 'completed' : ''}" onclick="openChapter(${ch.id})">
        <div class="chapter-header">
          <span class="chapter-num">CHAPTER ${ch.num}</span>
          <span class="chapter-status">${isCompleted ? '完了' : '未学習'}</span>
        </div>
        <div class="chapter-title">${ch.title}</div>
        <div class="chapter-title-de">${ch.titleDe}</div>
        <div class="chapter-desc">${ch.desc}</div>
      </div>
    `;
  }).join('');
}

function openChapter(id) {
  const ch = chapters.find(c => c.id === id);
  if (!ch) return;

  const isCompleted = state.completed.includes(ch.id);
  const note = state.notes[ch.id] || '';

  document.getElementById('chapterDetail').innerHTML = `
    <div class="back-btn" onclick="showSection('chapters')">← 章一覧に戻る</div>

    <div class="detail-header">
      <div class="detail-num">CHAPTER ${ch.num}</div>
      <div class="detail-title">${ch.title}</div>
      <div class="detail-title-de">${ch.titleDe}</div>
    </div>

    <div class="points-section">
      <div class="points-title">&#10022; 要点（クリックで詳細表示）</div>
      <div class="points-list">
        ${ch.points.map((p, i) => `
          <div class="point-item" onclick="togglePoint(this)">
            <div class="point-header">
              <span class="point-num">${i + 1}.</span>
              <span class="point-summary">${p.summary}</span>
              <span class="point-toggle">▼</span>
            </div>
            <div class="point-detail">
              <p>${p.detail}</p>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="concepts-section">
      <div class="concepts-title">&#10038; 重要概念</div>
      <div class="concept-list">
        ${ch.concepts.map(c => `
          <div class="concept-item">
            <div class="concept-term">${c.term}</div>
            <div class="concept-term-de">${c.termDe}</div>
            <div class="concept-def">${c.def}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="meditation-section">
      <div class="meditation-title">&#10047; 瞑想的実践</div>
      <div class="meditation-text">${ch.meditation}</div>
    </div>

    <div class="notes-section">
      <div class="notes-title">&#9998; 学習ノート</div>
      <textarea class="notes-textarea" placeholder="この章について感じたこと、気づき、疑問などを記録してください..." onchange="saveNote(${ch.id}, this.value)">${note}</textarea>
    </div>

    <button class="complete-btn ${isCompleted ? 'completed' : ''}" onclick="toggleComplete(${ch.id})">
      ${isCompleted ? '&#10003; 学習完了' : 'この章の学習を完了にする'}
    </button>
  `;

  showSection('detail');
  window.scrollTo(0, 0);
}

function togglePoint(el) {
  el.classList.toggle('expanded');
}

function saveNote(chapterId, text) {
  state.notes[chapterId] = text;
  saveState();
}

function toggleComplete(chapterId) {
  const idx = state.completed.indexOf(chapterId);
  if (idx >= 0) {
    state.completed.splice(idx, 1);
  } else {
    state.completed.push(chapterId);
  }
  saveState();
  updateProgress();
  openChapter(chapterId);
}

function renderGlossary(filter = '') {
  const list = document.getElementById('glossaryList');
  const filtered = filter
    ? glossary.filter(g =>
        g.term.includes(filter) ||
        g.termDe.toLowerCase().includes(filter.toLowerCase()) ||
        g.def.includes(filter)
      )
    : glossary;

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128269;</div>
        <div>該当する用語が見つかりません</div>
      </div>
    `;
    return;
  }

  list.innerHTML = filtered.map(g => `
    <div class="glossary-item">
      <div class="glossary-term">${g.term}</div>
      <div class="glossary-term-de">${g.termDe}</div>
      <div class="glossary-def">${g.def}</div>
    </div>
  `).join('');
}

function filterGlossary(value) {
  renderGlossary(value);
}

function renderMyNotes() {
  const list = document.getElementById('myNotesList');
  const notesEntries = Object.entries(state.notes).filter(([id, text]) => text.trim());

  if (notesEntries.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128221;</div>
        <div>まだノートがありません</div>
        <div style="margin-top:0.5rem;font-size:0.85rem">各章の学習時にノートを記録できます</div>
      </div>
    `;
    return;
  }

  list.innerHTML = notesEntries.map(([id, text]) => {
    const ch = chapters.find(c => c.id === parseInt(id));
    return `
      <div class="my-note-card" onclick="openChapter(${id})">
        <div class="my-note-header">
          <span class="my-note-chapter">Chapter ${ch ? ch.num : id}: ${ch ? ch.title : ''}</span>
        </div>
        <div class="my-note-content">${text}</div>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

loadState();
renderChapters();
updateProgress();
renderGlossary();
